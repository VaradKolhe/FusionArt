AWSTemplateFormatVersion: '2010-09-09'
Description: 'FusionArt Compute Stack: ALB and Auto Scaling Group'

Parameters:
  ProjectName:
    Type: String
    Default: FusionArt
  VpcId:
    Type: String
  PublicSubnet1:
    Type: String
  PublicSubnet2:
    Type: String
  PrivateAppSubnet1:
    Type: String
  PrivateAppSubnet2:
    Type: String
  ALBSecurityGroupId:
    Type: String
  ASGSecurityGroupId:
    Type: String
  EC2InstanceProfile:
    Type: String

Resources:
  # Application Load Balancer
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${ProjectName}-ALB
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroupId
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-ALB

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-TG
      Port: 8085
      Protocol: HTTP
      VpcId: !Ref VpcId
      HealthCheckPath: /api/auctions # Use an existing public endpoint
      HealthCheckIntervalSeconds: 30
      TargetType: instance
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-TG

  # Auto Scaling Group
  ASGLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub ${ProjectName}-Launch-Template
      LaunchTemplateData:
        ImageId: ami-00bb6a80f01f03502 # Amazon Linux 2023 (ap-south-1) - Update as needed
        InstanceType: t3.micro
        IamInstanceProfile:
          Name: !Ref EC2InstanceProfile
        SecurityGroupIds:
          - !Ref ASGSecurityGroupId
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            yum update -y
            yum install -y java-17-amazon-corretto-devel
            # Additional setup here (CodeDeploy Agent, etc.)

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub ${ProjectName}-ASG
      LaunchTemplate:
        LaunchTemplateId: !Ref ASGLaunchTemplate
        Version: !GetAtt ASGLaunchTemplate.LatestVersionNumber
      MinSize: '2'
      MaxSize: '4'
      DesiredCapacity: '2'
      VPCZoneIdentifier:
        - !Ref PrivateAppSubnet1
        - !Ref PrivateAppSubnet2
      TargetGroupArns:
        - !Ref ALBTargetGroup
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-EC2
          PropagateAtLaunch: true

Outputs:
  ALBDnsName:
    Value: !GetAtt ALB.DNSName
    Export:
      Name: !Sub ${ProjectName}-ALBDnsName
  ALBCanonicalHostedZoneID:
    Value: !GetAtt ALB.CanonicalHostedZoneId
    Export:
      Name: !Sub ${ProjectName}-ALBCanonicalHostedZoneID
