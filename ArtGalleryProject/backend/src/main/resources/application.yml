spring:
  main:
    allow-circular-references: true
  application:
    name: ArtGalleryProject
  config:
    import:
      - aws-secretsmanager:ArtGalleryProject
  
  # Database Configuration
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ArtGallery}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  
  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:true}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        # Adding dialect explicitly as a safety measure for startup speed
  
  # File Uploads
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  
  # Mail Configuration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${EMAIL_USERNAME:}
    password: ${EMAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Caching (Redis/ElastiCache)
  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # AWS Integration
  cloud:
    aws:
      region:
        static: ${AWS_REGION:ap-south-1}
      secrets-manager:
        enabled: true
        # Spring will look for a secret named 'ArtGalleryProject' by default
        # or you can specify a name:
        name: ArtGalleryProject

server:
  port: ${PORT:8085}
  servlet:
    context-path: /api

# Application Specific Configurations
app:
  image:
    path: ${IMAGE_PATH:image}
    s3-bucket: ${S3_BUCKET_IMAGES:}
    cdn-url: ${CDN_URL:}
  sqs:
    notification-queue: ${SQS_QUEUE_NOTIFICATIONS:}

# Razorpay
razorpay:
  key:
    id: ${RAZOR_PAY_KEY:}
    secret: ${RAZOR_PAY_SECRET:}

# Logging
logging:
  file:
    name: logs/artgallery.log
  level:
    org.springframework: ${LOG_LEVEL_SPRING:INFO}
    com.RESTAPI: ${LOG_LEVEL_APP:DEBUG}

# Expose Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when_authorized
      group:
        readiness:
          include: "*"
      # Disable specific health indicators that might be slow during startup
      # but are not critical for the initial Load Balancer check
  health:
    db:
      enabled: false
    redis:
      enabled: false
    sqs:
      enabled: false
