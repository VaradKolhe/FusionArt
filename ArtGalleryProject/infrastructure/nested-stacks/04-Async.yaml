AWSTemplateFormatVersion: '2010-09-09'
Description: 'FusionArt Async Stack: SQS and Lambda for Notifications (Speed Optimized)'

Parameters:
  ProjectName:
    Type: String
    Default: FusionArt
  LambdaExecutionRoleArn:
    Type: String

Resources:
  # SQS Queue
  NotificationQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${ProjectName}-Notification-Queue
      VisibilityTimeout: 300 # 5 minutes
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt NotificationDeadLetterQueue.Arn
        maxReceiveCount: 5

  NotificationDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${ProjectName}-Notification-DLQ

  # Notification Worker Lambda (Removed from VPC for speed and internet access)
  NotificationWorkerLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-Notification-Worker
      Handler: index.handler
      Role: !Ref LambdaExecutionRoleArn
      Runtime: nodejs20.x
      Timeout: 60
      MemorySize: 128
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            for (const record of event.Records) {
              const body = JSON.parse(record.body);
              console.log('Processing notification:', body);
              // Notification logic here (e.g., sending email)
            }
            return { statusCode: 200 };
          };
      Environment:
        Variables:
          PROJECT_NAME: !Ref ProjectName

  # SSM Parameter for SQS Discovery
  QueueUrlParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /config/FusionArt/SQS_QUEUE_NOTIFICATIONS
      Type: String
      Value: !Ref NotificationQueue

  # Lambda Event Source Mapping (SQS -> Lambda)
  NotificationEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      BatchSize: 10
      Enabled: true
      EventSourceArn: !GetAtt NotificationQueue.Arn
      FunctionName: !Ref NotificationWorkerLambda

Outputs:
  QueueUrl:
    Value: !Ref NotificationQueue
    Export:
      Name: !Sub ${AWS::StackName}-QueueUrl
  QueueArn:
    Value: !GetAtt NotificationQueue.Arn
    Export:
      Name: !Sub ${AWS::StackName}-QueueArn
