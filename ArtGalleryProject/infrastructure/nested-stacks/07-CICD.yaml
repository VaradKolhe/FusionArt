AWSTemplateFormatVersion: '2010-09-09'
Description: 'FusionArt CI/CD Stack: Complete Pipeline with CodeDeploy'

Parameters:
  ProjectName:
    Type: String
  ASGName:
    Type: String
  FrontendBucketName:
    Type: String
  ALBTargetGroupName:
    Type: String

Resources:
  Repo:
    Type: AWS::CodeCommit::Repository
    Properties:
      RepositoryName: !Ref ProjectName

  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub fusionart-artifacts-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled

  # CodeDeploy Resources
  DeployApp:
    Type: AWS::CodeDeploy::Application
    Properties:
      ApplicationName: !Sub ${ProjectName}-App
      ComputePlatform: Server

  DeployGroup:
    Type: AWS::CodeDeploy::DeploymentGroup
    Properties:
      ApplicationName: !Ref DeployApp
      DeploymentGroupName: !Sub ${ProjectName}-DeployGroup
      ServiceRoleArn: !GetAtt CodeDeployRole.Arn
      AutoScalingGroups:
        - !Ref ASGName
      DeploymentConfigName: CodeDeployDefault.AllAtOnce
      DeploymentStyle:
        DeploymentOption: WITH_TRAFFIC_CONTROL
        DeploymentType: IN_PLACE
      LoadBalancerInfo:
        TargetGroupInfoList:
          - Name: !Ref ALBTargetGroupName

  # IAM Roles
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [codebuild.amazonaws.com]
            Action: ['sts:AssumeRole']
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess # For student project speed, tighten in production

  CodeDeployRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [codedeploy.amazonaws.com]
            Action: ['sts:AssumeRole']
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSCodeDeployRole

  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [codepipeline.amazonaws.com]
            Action: ['sts:AssumeRole']
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess

  BuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub ${ProjectName}-Build
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux-x86_64-standard:5.0
        EnvironmentVariables:
          - Name: FRONTEND_BUCKET
            Value: !Sub fusionart-frontend-${AWS::AccountId}
      Source:
        Type: CODEPIPELINE

  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub ${ProjectName}-Pipeline
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Stages:
        - Name: Source
          Actions:
            - Name: SourceAction
              ActionTypeId: {Category: Source, Owner: AWS, Provider: CodeCommit, Version: '1'}
              OutputArtifacts: [{Name: SourceArtifact}]
              Configuration: {RepositoryName: !GetAtt Repo.Name, BranchName: main}
        - Name: Build
          Actions:
            - Name: BuildAction
              ActionTypeId: {Category: Build, Owner: AWS, Provider: CodeBuild, Version: '1'}
              InputArtifacts: [{Name: SourceArtifact}]
              OutputArtifacts: [{Name: BackendArtifact}, {Name: FrontendArtifact}]
              Configuration: {ProjectName: !Ref BuildProject}
        - Name: Deploy
          Actions:
            - Name: DeployBackend
              ActionTypeId: {Category: Deploy, Owner: AWS, Provider: CodeDeploy, Version: '1'}
              InputArtifacts: [{Name: BackendArtifact}]
              Configuration: {ApplicationName: !Ref DeployApp, DeploymentGroupName: !Ref DeployGroup}
            - Name: DeployFrontend
              ActionTypeId: {Category: Deploy, Owner: AWS, Provider: S3, Version: '1'}
              InputArtifacts: [{Name: FrontendArtifact}]
              Configuration: 
                BucketName: !Sub fusionart-frontend-${AWS::AccountId}
                Extract: true

Outputs:
  RepoCloneUrlHttp:
    Value: !GetAtt Repo.CloneUrlHttp
