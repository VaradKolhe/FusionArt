version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
      nodejs: 20
  pre_build:
    commands:
      - echo Installing dependencies...
      - cd ArtGalleryProject/frontend && npm install --legacy-peer-deps
      - cd ../backend && chmod +x mvnw
  build:
    commands:
      - echo Building Frontend...
      - cd ArtGalleryProject/frontend && npm run build
      - echo Building Backend...
      - cd ArtGalleryProject/backend && ./mvnw clean package -DskipTests
  post_build:
    commands:
      - echo Build completed on `date`
      - cp ArtGalleryProject/appspec_for_head.yml appspec.yml
      - cp ArtGalleryProject/buildspec_for_head.yml buildspec.yml

artifacts:
  files:
    - 'ArtGalleryProject/backend/target/ArtGalleryProject-0.0.1-SNAPSHOT.jar'
    - 'ArtGalleryProject/frontend/dist/**/*'
    - 'appspec.yml'
    - 'ArtGalleryProject/scripts/**/*'
  discard-paths: no
