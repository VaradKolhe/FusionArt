spring:
  main:
    allow-circular-references: true
  application:
    name: ArtGalleryProject
  config:
    import:
      - optional:aws-secretsmanager:FusionArt
      - optional:aws-parameterstore:/config/FusionArt/
  
  # Database Configuration
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ArtGallery}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  
  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:true}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        # Adding dialect explicitly as a safety measure for startup speed
  
  # File Uploads
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  
  # Mail Configuration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${EMAIL_USERNAME:}
    password: ${EMAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Caching (Redis/ElastiCache)
  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # AWS Integration
  cloud:
    aws:
      region:
        static: ${AWS_REGION:ap-south-1}
      secrets-manager:
        enabled: true
        # Match the secret name in 08-Secrets.yaml
        name: FusionArt

server:
  port: ${PORT:8085}
  servlet:
    context-path: /api

# Frontend Configuration
frontend:
  url: ${CDN_URL:http://localhost:5173}

# Application Specific Configurations
app:
  jwt:
    secret: ${JWT_SECRET:23ui42ydq78cebqnspduq8o2h47ybr807G@*&G)&*TBD87qdb87gw7gw7dxhsefgbouydewgfyeb8723brf87gv2bdy8eg3w2g6}
  image:
    path: ${IMAGE_PATH:image}
    s3-bucket: ${S3_BUCKET_IMAGES:}
    cdn-url: ${CDN_URL:}
  sqs:
    notification-queue: ${SQS_QUEUE_NOTIFICATIONS:}

# Razorpay
razorpay:
  key:
    id: ${RAZOR_PAY_KEY:}
    secret: ${RAZOR_PAY_SECRET:}

# Logging
logging:
  file:
    name: logs/artgallery.log
  level:
    org.springframework: ${LOG_LEVEL_SPRING:INFO}
    com.RESTAPI: ${LOG_LEVEL_APP:DEBUG}

# Expose Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
      group:
        readiness:
          include: "db,redis,sqs"
        liveness:
          include: "db"
  health:
    db:
      enabled: ${HEALTH_CHECK_DB:true}
    redis:
      enabled: ${HEALTH_CHECK_REDIS:true}
    sqs:
      enabled: ${HEALTH_CHECK_SQS:true}
    mail:
      enabled: false
