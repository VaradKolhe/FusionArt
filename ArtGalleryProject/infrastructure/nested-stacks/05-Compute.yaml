AWSTemplateFormatVersion: '2010-09-09'
Description: 'FusionArt Compute Stack: Final Resilient Version with SSM AMI'

Parameters:
  ProjectName:
    Type: String
  VpcId:
    Type: String
  PublicSubnet1:
    Type: String
  PublicSubnet2:
    Type: String
  PrivateAppSubnet1:
    Type: String
  PrivateAppSubnet2:
    Type: String
  ALBSecurityGroupId:
    Type: String
  ASGSecurityGroupId:
    Type: String
  EC2InstanceProfile:
    Type: String
  RDSEndpoint:
    Type: String
  RedisEndpoint:
    Type: String
  QueueUrl:
    Type: String
  DBUser:
    Type: String
  DBPassword:
    Type: String
  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64'

Resources:
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroupId

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Port: 8085
      Protocol: HTTP
      VpcId: !Ref VpcId
      HealthCheckPath: /api/actuator/health
      HealthCheckIntervalSeconds: 10
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 2
      TargetType: instance
      Matcher:
        HttpCode: '200-399'
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: '5'

  ASGLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !Ref LatestAmiId
        InstanceType: t3.micro
        IamInstanceProfile:
          Name: !Ref EC2InstanceProfile
        NetworkInterfaces:
          - DeviceIndex: 0
            AssociatePublicIpAddress: true
            Groups:
              - !Ref ASGSecurityGroupId
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            yum update -y
            yum install -y java-17-amazon-corretto-devel ruby wget lsof psmisc
            
            # Setup Environment Variables for Spring Boot
            cat <<EOF > /etc/profile.d/fusionart_env.sh
            export DB_URL="jdbc:mysql://${RDSEndpoint}:3306/ArtGallery"
            export DB_USERNAME="${DBUser}"
            export DB_PASSWORD="${DBPassword}"
            export REDIS_HOST="${RedisEndpoint}"
            export SQS_QUEUE_NOTIFICATIONS="${QueueUrl}"
            export AWS_REGION="${AWS::Region}"
            export PORT=8085
            EOF
            
            source /etc/profile.d/fusionart_env.sh

            cd /home/ec2-user
            wget https://aws-codedeploy-${AWS::Region}.s3.${AWS::Region}.amazonaws.com/latest/install
            chmod +x ./install
            ./install auto
            systemctl start codedeploy-agent

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref ASGLaunchTemplate
        Version: !GetAtt ASGLaunchTemplate.LatestVersionNumber
      MinSize: '2'
      MaxSize: '4'
      DesiredCapacity: '2'
      VPCZoneIdentifier:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      TargetGroupARNs:
        - !Ref ALBTargetGroup
      HealthCheckType: ELB
      HealthCheckGracePeriod: 60

Outputs:
  ALBDnsName:
    Value: !GetAtt ALB.DNSName
    Export:
      Name: !Sub ${AWS::StackName}-ALBDnsName
  ASGName:
    Value: !Ref AutoScalingGroup
    Export:
      Name: !Sub ${AWS::StackName}-ASGName
  TargetGroupName:
    Value: !GetAtt ALBTargetGroup.TargetGroupName
    Export:
      Name: !Sub ${AWS::StackName}-TargetGroupName
