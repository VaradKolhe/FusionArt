AWSTemplateFormatVersion: '2010-09-09'
Description: 'FusionArt Compute Stack: Hardcoded Mumbai with Package Conflict Fix'

Parameters:
  ProjectName:
    Type: String
  VpcId:
    Type: String
  PublicSubnet1:
    Type: String
  PublicSubnet2:
    Type: String
  PrivateAppSubnet1:
    Type: String
  PrivateAppSubnet2:
    Type: String
  ALBSecurityGroupId:
    Type: String
  ASGSecurityGroupId:
    Type: String
  EC2InstanceProfile:
    Type: String
  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64'

Resources:
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroupId

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Port: 8085
      Protocol: HTTP
      VpcId: !Ref VpcId
      HealthCheckPath: /api/actuator/health/readiness
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      TargetType: instance
      Matcher:
        HttpCode: '200-399'

  ASGLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !Ref LatestAmiId
        InstanceType: t3.micro
        IamInstanceProfile:
          Name: !Ref EC2InstanceProfile
        NetworkInterfaces:
          - DeviceIndex: 0
            AssociatePublicIpAddress: true
            Groups:
              - !Ref ASGSecurityGroupId
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            
            exec > >(tee /var/log/fusionart-userdata.log) 2>&1
            set -xeuo pipefail
            
            date
            cat /etc/os-release || true
            uname -a || true
            
            yum update -y
            
            # Fix Amazon Linux 2023 curl-minimal conflict
            yum install -y --allowerasing java-17-amazon-corretto-devel ruby wget lsof psmisc curl
            
            java -version || true
            ruby --version || true
            curl --version || true
            
            cat <<EOF > /etc/profile.d/fusionart_env.sh
            export AWS_REGION="ap-south-1"
            export PORT=8085
            EOF
            
            chmod +x /etc/profile.d/fusionart_env.sh
            source /etc/profile.d/fusionart_env.sh
            
            echo "AWS_REGION=$AWS_REGION"
            echo "PORT=$PORT"
            
            cd /home/ec2-user || cd /tmp
            
            wget https://aws-codedeploy-ap-south-1.s3.ap-south-1.amazonaws.com/latest/install
            
            chmod +x install
            ./install auto
            
            systemctl daemon-reload || true
            systemctl enable codedeploy-agent || true
            systemctl start codedeploy-agent || true
            
            systemctl status codedeploy-agent --no-pager || true
            ps -ef | grep codedeploy | grep -v grep || true
            
            echo "DONE"

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    UpdatePolicy:
      AutoScalingRollingUpdate:
        MinInstancesInService: '1'
        MaxBatchSize: '1'
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref ASGLaunchTemplate
        Version: !GetAtt ASGLaunchTemplate.LatestVersionNumber
      MinSize: '2'
      MaxSize: '3'
      DesiredCapacity: '2'
      VPCZoneIdentifier:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      TargetGroupARNs:
        - !Ref ALBTargetGroup
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300

Outputs:
  ALBDnsName:
    Value: !GetAtt ALB.DNSName
    Export:
      Name: !Sub ${AWS::StackName}-ALBDnsName
  ASGName:
    Value: !Ref AutoScalingGroup
    Export:
      Name: !Sub ${AWS::StackName}-ASGName
  TargetGroupName:
    Value: !GetAtt ALBTargetGroup.TargetGroupName
    Export:
      Name: !Sub ${AWS::StackName}-TargetGroupName
